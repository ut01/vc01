url: "https://ut01.github.io/vc01"
title: "vc01: Global Venture & Technology Monitor"
description: "Terminal-style dashboard for venture capital, technology trends, and startup ecosystems. Curated links to VC funds, investors, AI research, tech blogs, and thought leaders."

# Build settings
plugins:
  - jekyll-sitemap

# CSS minification
sass:
  style: compressed

# SEO-related settings
lang: en
author: vc01
twitter:
  username: vc01
  card: summary_large_image

# Exclude files from processing
exclude:
  - README.md
  - README.CN.md
  - LICENSE
  - .gitignore
  - Gemfile
  - Gemfile.lock 